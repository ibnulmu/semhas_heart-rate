<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SEMINAR HASIL MQTT | Dua Grafik HR & SpO₂</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/mqtt@5.0.0/dist/mqtt.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="header">
    <h1>💓 SEMINAR HASIL  <span class="badge">Implementasi Sistem Monitoring Tanda Vital Secara Real Time</span></h1>
    <div class="connection-status">
      <div class="led" id="ledIndicator"></div>
      <span id="statusText">Menghubungkan...</span>
    </div>
  </div>

  <div class="cards">
    <div class="card heart">
      <h2>❤️ Detak Jantung</h2>
      <div class="value" id="hr">--</div>
      <div class="unit">bpm</div>
    </div>
    <div class="card spo2">
      <h2>🩸 Saturasi Oksigen</h2>
      <div class="value" id="spo2">--</div>
      <div class="unit">SpO₂</div>
    </div>
  </div>

  <div class="chart-grid">
    <div class="chart-card">
      <div class="chart-title">📊 Heart Rate (bpm) </div>
      <canvas id="hrChart" width="600" height="300"></canvas>
    </div>
    
    <div class="chart-card">
      <div class="chart-title">🩸 SpO₂ (%) </div>
      <canvas id="spo2Chart" width="600" height="300"></canvas>
    </div>
  </div>

  <div class="footer-info">
    <p>Ibnul Mubaroq | Nim: 2331110026 <p>
    <p>Restu Ning Prihatin | Nim: 2331110073</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
